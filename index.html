<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Farm Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0ebe3;
    --brown-dark: #4a2e1a;
    --brown-mid: #7a5238;
    --brown-light: #c8a882;
    --green: #4a8c3f;
    --green-light: #e6f2e4;
    --green-mid: #6aaa5e;
    --surface: #ffffff;
    --border: #ddd6ca;
    --text: #2c1a0e;
    --text2: #6b5a4e;
    --text3: #a0907e;
    --shadow: 0 4px 20px rgba(74,46,26,0.12);
    --shadow-lg: 0 8px 40px rgba(74,46,26,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .phone {
    width: 100%;
    max-width: 390px;
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* ── 上部ブラウンゾーン ── */
  .top-zone {
    background: var(--brown-dark);
    padding: 52px 28px 40px;
    position: relative;
    overflow: hidden;
  }
  .top-zone::after {
    content: '';
    position: absolute;
    bottom: -30px;
    left: 0; right: 0;
    height: 60px;
    background: var(--bg);
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  }

  /* 装飾的な円 */
  .deco-circle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.07;
    background: #fff;
  }
  .deco-circle.c1 { width: 200px; height: 200px; top: -60px; right: -50px; }
  .deco-circle.c2 { width: 120px; height: 120px; bottom: 10px; left: -30px; }

  .app-icon {
    width: 88px; height: 88px;
    background: transparent;
    
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }
  .app-name {
    font-size: 28px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -0.5px;
    position: relative;
    z-index: 1;
  }
  .app-name span {
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    display: block;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  /* ── メインコンテンツ ── */
  .main {
    flex: 1;
    padding: 20px 24px 40px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text3);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  /* ── アプリカード ── */
  .app-card {
    background: var(--surface);
    border-radius: 20px;
    box-shadow: var(--shadow);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    border: 1px solid var(--border);
  }
  .app-card:active { transform: scale(0.98); box-shadow: none; }

  .card-top {
    padding: 22px 22px 16px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .card-icon {
    width: 52px; height: 52px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
  }
  .card-icon.brown { background: var(--brown-dark); }
  .card-icon.green { background: var(--green); }

  .card-text { flex: 1; }
  .card-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .card-desc {
    font-size: 12px;
    color: var(--text3);
    line-height: 1.6;
  }

  .card-footer {
    padding: 12px 22px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-tags { display: flex; gap: 6px; }
  .card-tag {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
  }
  .card-arrow {
    font-size: 13px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── フッター ── */
  .footer {
    padding: 0 24px 36px;
    text-align: center;
    font-size: 11px;
    color: var(--text3);
    line-height: 1.8;
  }
  .footer-logo {
    font-size: 15px;
    font-weight: 700;
    color: var(--brown-mid);
    margin-bottom: 4px;
  }
</style>
</head>
